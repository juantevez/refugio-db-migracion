services:
  db:
    image: postgres:15-alpine
    container_name: shelter_db
    environment:
      POSTGRES_USER: shelter_user
      POSTGRES_PASSWORD: shelter_password
      POSTGRES_DB: shelter_db
    volumes:
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shelter_user -d shelter_db"]
      interval: 3s
      timeout: 3s
      retries: 5

  flyway:
    image: flyway/flyway:10-alpine
    container_name: shelter_flyway
    volumes:
      - ./migrations:/flyway/sql
    depends_on:
      db:
        condition: service_healthy
    command: >
      -url=jdbc:postgresql://db:5432/shelter_db 
      -user=shelter_user 
      -password=shelter_password 
      -connectRetries=60 
      migrate